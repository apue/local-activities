services:
  wechat2rss:
    image: ${WECHAT2RSS_IMAGE:-ttttmr/wechat2rss:latest}
    container_name: local-activities-wechat2rss
    restart: unless-stopped
    ports:
      - "${WECHAT2RSS_BIND_HOST:-127.0.0.1}:${WECHAT2RSS_PORT:-4000}:80"
    env_file:
      - ${WECHAT2RSS_ENV_FILE:-.env.wechat2rss}
    volumes:
      - wechat2rss-data:/app/data

volumes:
  wechat2rss-data:
